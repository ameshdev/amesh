name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this solve? What's the use case?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How do you think this should work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "What other approaches did you consider?"
  - type: dropdown
    id: package
    attributes:
      label: Related package
      options:
        - "@authmesh/cli"
        - "@authmesh/sdk"
        - "@authmesh/core"
        - "@authmesh/keystore"
        - "@authmesh/relay"
        - "Documentation"
        - "Other"
