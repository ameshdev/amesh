name: Bug Report
description: Report a bug in amesh
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: amesh version
      description: "Run `amesh --version` or check your package.json"
      placeholder: "0.5.0"
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@authmesh/cli"
        - "@authmesh/sdk"
        - "@authmesh/core"
        - "@authmesh/keystore"
        - "@authmesh/relay"
        - "Other"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "macOS 15.4 arm64 / Ubuntu 24.04 x64"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "A clear description of the bug"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to reproduce the behavior"
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What you expected to happen"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: "Paste any error messages or logs (redact sensitive data)"
      render: shell
