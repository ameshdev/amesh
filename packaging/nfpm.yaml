name: amesh
arch: "${DEB_ARCH}"
platform: linux
version: "${VERSION}"
maintainer: "amesh <hello@authmesh.dev>"
description: "Device-bound M2M authentication CLI — replaces static API keys with P-256 ECDSA device identities"
homepage: "https://github.com/ameshdev/amesh"
license: MIT
contents:
  - src: ./dist/amesh
    dst: /usr/bin/amesh
    file_info:
      mode: 0755
  - src: ./dist/amesh-agent
    dst: /usr/bin/amesh-agent
    file_info:
      mode: 0755
